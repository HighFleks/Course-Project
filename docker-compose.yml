version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: meal_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meal_user
      POSTGRES_PASSWORD: meal_pass
      POSTGRES_DB: meal_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: